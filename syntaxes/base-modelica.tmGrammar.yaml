fileTypes:
  - bmo
# Detect *.mo files that start with //! base X.Y.Z as Base Modelica
firstLineMatch: "^//! base \\d+\\.\\d+\\.\\d+"
name: Base Modelica

patterns:
  # Base Modelica version header: //! base X.Y.Z
  # This is required as the first line of every Base Modelica file,
  # including *.bmo files.
  - match: ^//!\s+base\s+\S.*$\n?
    name: comment.line

  # Comments
  - begin: /\*
    end: \*/
    name: comment.block
  - match: (//).*$\n?
    name: comment.line

  # Constants
  - match: \b(true|false)\b
    name: constant.language
  - match: \b((0(x|X)[0-9a-fA-F]*)|(([0-9]+\.?[0-9]*)|(\.[0-9]+))((e|E)(\+|-)?[0-9]+)?)\b
    name: constant.numeric

  # Storage types (same as full Modelica)
  - match: \b(Real|Integer|Boolean|String|enumeration|type)\b
    name: storage.type

  # Storage modifiers
  # EXCEPTION: Removed compared to full Modelica: expandable, replaceable, redeclare,
  #            constrainedby, import, connector
  #            (Base Modelica has no connectors, no replaceable components, no imports)
  - match: \b(constant|final|parameter|flow|stream|discrete)\b
    name: storage.modifier

  # Keywords: qualified names (dotted paths like Modelica.SIunits.Voltage)
  - match: \b\s*([a-zA-Z])(?:([^ ;,:=\($]+)(;)?)([.]([a-zA-Z])(?:([^ ;,:=\($]+)(;)?)?)++\b
    name: keyword
  # Control flow (same as full Modelica)
  - match: \b(for|if|when|while|in|then|loop|end if|end when|end for|end while|else|elsewhen|break|return|each|elseif|input|output)\b
    name: keyword.control
  - match: \b(and|or|not)\b
    name: keyword.control
  - match: <|<\=|>|>\=|\=\=|<>
    name: keyword.operator.comparison
  - match: \+|\-|\.\+|\.\-|\*|\.\*|/|\./|\^
    name: keyword.operator.arithmetic
  - match: \=|\:\=
    name: keyword.operator.assignment
  - match: \b(algorithm|equation|protected|public|end|external)\b
    name: keyword

  # Support functions (same as full Modelica)
  - match: \b(acos|asin|atan|atan2|cos|cosh|exp|log|log10|sin|sinh|tan|tanh|abs|sign|sqrt|max|min|product|sum)\b
    name: support.function.mathematical
  - match: \b(scalar|vector|matrix|identity|diagonal|zeros|ones|fill|linspace|transpose|outerProduct|symmetric|cross|skew)\b
    name: support.function.array
  - match: \b(ceil|div|floor|integer|max|min|mod|rem|pre|noEvent|change|edge|initial|terminal|reinit|sample|smooth|terminate)\b
    name: support.function.event
  - match: \b(connect|der|inStream|actualStream|semiLinear|spatialDistribution|getInstanceName|homotopy|delay|assert|ndims|size|cardinality|isPresent)\b
    name: support.function.special

  # EXCEPTION: Removed compared to full Modelica: extends, partial, within
  #            (Base Modelica does not support class inheritance or within clauses)

  # Class definitions
  # EXCEPTION: Removed compared to full Modelica: 'class' and 'connector' class kinds
  #            (Base Modelica only supports model, record, block, package, function, type)
  # Q-IDENT: class names may be quoted identifiers like 'CauerLowPassSC'
  - begin: \b(model|record|block|package|function|type)\s+(\w+|'[^']*')\s*("([^"]|\\")*(?<!\\)")?
    beginCaptures:
      1:
        name: keyword
      2:
        name: entity.name.type
      3:
        name: comment.line
    end: \b(end)\s+(\2)\s*;
    endCaptures:
      1:
        name: keyword
      2:
        name: entity.name.type
    patterns:
      - include: "source.base-modelica"

  # Q-IDENT: quoted identifiers used as component/variable names in Base Modelica
  # e.g. Real 'C1.v', parameter Real 'l1'
  - match: "'[^']*'"
    name: variable.other.quoted

  # Function calls
  - match: \b(?<!\.)(\w|\w+[\.\w+]*\w)\s*\(
    name: entity.name.function

  # Annotations
  - begin: \b(annotation)\b
    beginCaptures:
      1:
        name: keyword
    end: \)\s*;
    patterns:
      - include: '#annotations'

  # Documentation Strings
  - match: (?<!else\s*)(?<![=+]\s*)((?<!\\)"([^"]|\\")*(?<!\\)")\s*;
    captures:
      1:
        name: comment.line

  # Strings
  - begin: \"
    end: \"
    name: string.quoted.double
    patterns:
      - include: '#escapes'

repository:
  escapes:
    match: '\\(x\h{2}|[0-2][0-7]{0,2}|3[0-6][0-7]|37[0-7]?|[4-7][0-7]?|.)'
    name: constant.character.escape

  annotations:
    patterns:
      - match: \b(Evaluate|version|versionDate|dateModified|HideResult|singleInstance|mustBeConnected|mayOnlyConnectOnce|Inline|LateInline)\b
      - begin: \b(experiment)\s*\(
        beginCaptures:
          1:
            name: keyword
        end: \)
        patterns:
          - include: '#experiment'
          - include: '#experiment'
      - include: "source.base-modelica"

  experiment:
    patterns:
      - match: \b(StartTime|StopTime|Interval|Tolerance)\b
        name: keyword
      - include: "source.base-modelica"

scopeName: source.base-modelica
